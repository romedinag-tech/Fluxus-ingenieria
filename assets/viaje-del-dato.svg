<svg viewBox="0 0 1180 400" xmlns="http://www.w3.org/2000/svg" font-family="Inter,Segoe UI,sans-serif">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0D6EFD"/><stop offset="0.5" stop-color="#18D6FF"/><stop offset="1" stop-color="#21F2C3"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a2750"/><stop offset="1" stop-color="#071f44"/>
    </linearGradient>
  </defs>

  <!-- header -->
  <text x="20" y="34" fill="#18D6FF" font-size="14" font-weight="700" letter-spacing="2">EL VIAJE DEL DATO</text>
  <text x="20" y="66" fill="#E6EEF8" font-size="26" font-weight="800">Del evento real a un indicador para decidir</text>

  <!-- connectors -->
  <g stroke="url(#g)" stroke-width="2.4" fill="none" opacity="0.8">
    <path d="M278 230 h28" marker-end="url(#ah)"/>
  </g>
  <g fill="#18D6FF" opacity="0.85">
    <path d="M300 222 l10 8 -10 8 z"/>
    <path d="M594 222 l10 8 -10 8 z"/>
    <path d="M888 222 l10 8 -10 8 z"/>
  </g>

  <!-- CARD 1 — El Evento -->
  <g>
    <rect x="20" y="110" width="262" height="240" rx="16" fill="url(#panel)" stroke="#14346a"/>
    <rect x="36" y="126" width="40" height="40" rx="11" fill="url(#g)"/>
    <text x="56" y="152" text-anchor="middle" fill="#04223f" font-size="20" font-weight="800">1</text>
    <!-- icon: persona subiendo al bus -->
    <g transform="translate(96,196)" stroke="#18D6FF" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M2 4h30a4 4 0 0 1 4 4v30H2z"/><path d="M2 14h36"/>
      <circle cx="20" cy="26" r="3.2" fill="#18D6FF" stroke="none"/>
    </g>
    <g transform="translate(150,188)" stroke="#21F2C3" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="10" cy="6" r="4.5"/><path d="M10 12v16M10 18l-9 6M10 18l9 6M10 28l-7 12M10 28l7 12"/>
    </g>
    <text x="36" y="296" fill="#fff" font-size="17" font-weight="700">El evento</text>
    <text x="36" y="320" fill="#9fb6d6" font-size="13.5">Una persona sube o</text>
    <text x="36" y="338" fill="#9fb6d6" font-size="13.5">baja del bus.</text>
  </g>

  <!-- CARD 2 — La Detección -->
  <g>
    <rect x="314" y="110" width="262" height="240" rx="16" fill="url(#panel)" stroke="#14346a"/>
    <rect x="330" y="126" width="40" height="40" rx="11" fill="url(#g)"/>
    <text x="350" y="152" text-anchor="middle" fill="#04223f" font-size="20" font-weight="800">2</text>
    <!-- icon: cámara IA con haz -->
    <g transform="translate(388,190)" stroke="#18D6FF" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="0" y="6" width="34" height="26" rx="4"/><path d="M34 13l14-6v32l-14-6"/><circle cx="16" cy="19" r="7"/>
    </g>
    <g transform="translate(440,182)" stroke="#21F2C3" stroke-width="2" fill="none" opacity="0.85" stroke-dasharray="4 4">
      <path d="M6 18 L40 6M6 30 L40 42"/>
    </g>
    <rect x="470" y="196" width="20" height="20" rx="3" fill="none" stroke="#21F2C3" stroke-width="2"/>
    <text x="330" y="296" fill="#fff" font-size="17" font-weight="700">La detección</text>
    <text x="330" y="320" fill="#9fb6d6" font-size="13.5">Cámara binocular con IA</text>
    <text x="330" y="338" fill="#9fb6d6" font-size="13.5">identifica a la persona.</text>
  </g>

  <!-- CARD 3 — La Firma Digital -->
  <g>
    <rect x="608" y="110" width="262" height="240" rx="16" fill="url(#panel)" stroke="#14346a"/>
    <rect x="624" y="126" width="40" height="40" rx="11" fill="url(#g)"/>
    <text x="644" y="152" text-anchor="middle" fill="#04223f" font-size="20" font-weight="800">3</text>
    <!-- icon: chip / firma -->
    <g transform="translate(688,188)" stroke="#18D6FF" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <rect x="6" y="6" width="32" height="32" rx="5"/>
      <path d="M14 0v6M22 0v6M30 0v6M14 38v6M22 38v6M30 38v6M0 14h6M0 22h6M0 30h6M38 14h6M38 22h6M38 30h6"/>
      <circle cx="22" cy="22" r="6" fill="#21F2C3" stroke="none"/>
    </g>
    <text x="624" y="296" fill="#fff" font-size="17" font-weight="700">La firma digital</text>
    <text x="624" y="320" fill="#9fb6d6" font-size="13.5">Se registra el dato:</text>
    <text x="624" y="338" fill="#9fb6d6" font-size="13.5">objetivo y anónimo.</text>
  </g>

  <!-- CARD 4 — La Transmisión -->
  <g>
    <rect x="902" y="110" width="262" height="240" rx="16" fill="url(#panel)" stroke="#14346a"/>
    <rect x="918" y="126" width="40" height="40" rx="11" fill="url(#g)"/>
    <text x="938" y="152" text-anchor="middle" fill="#04223f" font-size="20" font-weight="800">4</text>
    <!-- icon: nube + base de datos -->
    <g transform="translate(978,186)" stroke="#18D6FF" stroke-width="2.6" fill="none" stroke-linecap="round" stroke-linejoin="round">
      <path d="M10 30h22a9 9 0 0 0 1-18 12 12 0 0 0-23-3 8 8 0 0 0 0 21z"/>
      <path d="M21 28v-12M21 16l-5 5M21 16l5 5"/>
    </g>
    <g transform="translate(1040,196)" stroke="#21F2C3" stroke-width="2.4" fill="none">
      <ellipse cx="11" cy="6" rx="11" ry="3.4"/><path d="M0 6v14c0 1.7 4.9 3 11 3s11-1.3 11-3V6"/><path d="M0 13c0 1.7 4.9 3 11 3s11-1.3 11-3"/>
    </g>
    <text x="918" y="296" fill="#fff" font-size="17" font-weight="700">El indicador</text>
    <text x="918" y="320" fill="#9fb6d6" font-size="13.5">Demanda y evasión, en</text>
    <text x="918" y="338" fill="#21F2C3" font-size="13.5" font-weight="700">vivo, listas para decidir.</text>
  </g>
</svg>
